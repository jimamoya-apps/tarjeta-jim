<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jim Alejandro Moya · MenteIACreativa</title>
  <meta name="description" content="Tarjeta digital de Jim Alejandro Moya · Founder · MenteIACreativa" />

  <!-- Open Graph (para compartir) -->
  <meta property="og:title" content="Jim Alejandro Moya · Founder · MenteIACreativa" />
  <meta property="og:description" content="Sistemas que convierten atención en clientes." />
  <meta property="og:type" content="website" />

  <!-- Mobile polish -->
  <meta name="theme-color" content="#070A10" />
  <meta name="color-scheme" content="dark" />

  <style>
    :root{
      --bg0:#070A10;
      --bg1:#0B1220;
      --card:#0B1220CC;
      --stroke:#1E2A44;
      --text:#EAF1FF;
      --muted:#A8B6D6;
      --accent:#0d9fe7;
      --accent2:#0284c7;

      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --shadow2: 0 26px 80px rgba(0,0,0,.55);

      --radius: 22px;
      --btnRadius: 16px;
      --max: 720px;
      --pad: 22px;

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", "Noto Sans", "Liberation Sans", sans-serif;

      --easeOut: cubic-bezier(.16, 1, .3, 1);
      --easeSoft: cubic-bezier(.2, .8, .2, 1);
      --ring: 0 0 0 3px rgba(13,159,231,.25);
      --tap: scale(.985);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);

      /* Fondo con vida (sutil) */
      background:
        radial-gradient(1200px 800px at 15% 10%, rgba(13,159,231,.18), transparent 55%),
        radial-gradient(900px 700px at 85% 25%, rgba(2,132,199,.12), transparent 60%),
        radial-gradient(900px 700px at 55% 95%, rgba(13,159,231,.10), transparent 58%),
        linear-gradient(180deg, var(--bg0), var(--bg1));

      /* Ajustes para móvil (evita “saltos”) */
      min-height: 100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: clamp(14px, 3.2vw, 22px);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      overflow-x:hidden;
    }

    /* Glow ambiental muy suave */
    body::before{
      content:"";
      position:fixed;
      inset:-40%;
      pointer-events:none;
      background:
        radial-gradient(closest-side at 30% 20%, rgba(13,159,231,.10), transparent 70%),
        radial-gradient(closest-side at 75% 60%, rgba(2,132,199,.08), transparent 72%);
      filter: blur(18px);
      opacity:.75;
      animation: ambient 12s var(--easeSoft) infinite alternate;
    }

    @keyframes ambient{
      from{ transform: translate3d(-1%, -1%, 0) scale(1); opacity:.72; }
      to{ transform: translate3d(1.2%, 1.3%, 0) scale(1.02); opacity:.78; }
    }

    .wrap{
      width:min(var(--max), 100%);
      position:relative;
      z-index:1;
    }

    .card{
      position:relative;
      background:var(--card);
      border:1px solid rgba(30,42,68,.75);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding: clamp(18px, 4vw, 28px);
      backdrop-filter: blur(10px);
      transform: translateY(10px) scale(.99);
      opacity: 0;
      animation: enter .55s var(--easeOut) forwards;
    }

    @keyframes enter{
      to{ transform: translateY(0) scale(1); opacity: 1; }
    }

    /* línea tech sutil */
    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(520px 240px at 30% 5%, rgba(13,159,231,.28), transparent 55%),
        radial-gradient(480px 240px at 70% 100%, rgba(2,132,199,.18), transparent 60%),
        linear-gradient(90deg, rgba(13,159,231,.08), rgba(2,132,199,.02), rgba(13,159,231,.06));
      opacity:.65;
      pointer-events:none;
      mask: linear-gradient(#000, transparent 70%);
    }

    /* borde glow que “respira” suave */
    .card::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:var(--radius);
      pointer-events:none;
      box-shadow:
        inset 0 0 0 1px rgba(13,159,231,.05),
        inset 0 0 0 1px rgba(2,132,199,.04);
      opacity:.9;
    }

    .top{
      position:relative;
      display:flex;
      gap:16px;
      align-items:flex-start;
      justify-content:space-between;
    }

    .name{
      font-size: clamp(28px, 4.6vw, 44px);
      line-height:1.08;
      margin:0;
      letter-spacing:-.02em;
    }

    .role{
      margin-top:10px;
      font-size: 15px;
      color:var(--muted);
    }

    .role b{
      color:var(--text);
      font-weight:600;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      margin-top:6px;
    }

    .dot{
      width:10px;height:10px;border-radius:99px;
      background: radial-gradient(circle at 30% 30%, #7fe0ff, var(--accent));
      box-shadow: 0 0 18px rgba(13,159,231,.55);
    }

    .divider{
      position:relative;
      margin:18px 0 16px;
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(13,159,231,.55), rgba(30,42,68,.85), transparent);
      opacity:.9;
    }

    .value{
      position:relative;
      margin:0;
      font-size: clamp(16px, 2.6vw, 20px);
      color:var(--text);
      line-height:1.45;
    }

    .value span{
      color: #CFEAFF;
    }

    .actions{
      position:relative;
      margin-top:18px;
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      width:100%;
      padding:14px 16px;
      border-radius:var(--btnRadius);
      border:1px solid rgba(30,42,68,.85);
      background: rgba(9,14,26,.65);
      color:var(--text);
      text-decoration:none;
      transition:
        transform .18s var(--easeOut),
        border-color .18s var(--easeOut),
        background .18s var(--easeOut),
        box-shadow .18s var(--easeOut);
      will-change: transform;
    }

    .btn:hover{
      transform: translateY(-2px);
      border-color: rgba(13,159,231,.7);
      background: rgba(9,14,26,.78);
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    }

    .btn:active{
      transform: var(--tap);
    }

    .btn:focus-visible{
      outline: none;
      box-shadow: var(--ring), 0 10px 24px rgba(0,0,0,.35);
      border-color: rgba(13,159,231,.8);
    }

    .btnPrimary{
      border-color: rgba(13,159,231,.55);
      background: linear-gradient(135deg, rgba(13,159,231,.20), rgba(2,132,199,.12));
      position:relative;
      overflow:hidden;
    }

    /* Shine + glow sutil para el CTA principal */
    .btnPrimary::before{
      content:"";
      position:absolute;
      inset:-40%;
      background:
        radial-gradient(closest-side at 20% 40%, rgba(37,211,102,.18), transparent 70%),
        radial-gradient(closest-side at 60% 10%, rgba(13,159,231,.16), transparent 72%),
        linear-gradient(120deg, transparent 35%, rgba(234,241,255,.08) 45%, transparent 55%);
      transform: translate3d(-8%, -6%, 0);
      opacity:.75;
      animation: ctaGlow 5.5s var(--easeSoft) infinite;
      pointer-events:none;
    }

    @keyframes ctaGlow{
      0%   { transform: translate3d(-10%, -8%, 0) rotate(0deg); opacity:.65; }
      50%  { transform: translate3d(6%, 3%, 0) rotate(2deg); opacity:.85; }
      100% { transform: translate3d(-10%, -8%, 0) rotate(0deg); opacity:.65; }
    }

    .left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      position:relative;
      z-index:1;
    }

    .icon{
      width:38px;height:38px;border-radius:12px;
      display:grid;place-items:center;
      background: rgba(13,159,231,.12);
      border:1px solid rgba(13,159,231,.25);
      flex:0 0 auto;
      transition: transform .18s var(--easeOut);
    }

    .btn:hover .icon{
      transform: translateY(-1px);
    }

    .label{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
      position:relative;
      z-index:1;
    }

    .label strong{font-size:15px}
    .label small{
      font-size:12px;
      color:var(--muted);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width: 56ch;
    }

    .arrow{
      opacity:.9;
      flex:0 0 auto;
      color: rgba(234,241,255,.9);
      transition: transform .18s var(--easeOut), opacity .18s var(--easeOut);
      position:relative;
      z-index:1;
    }

    .btn:hover .arrow{
      transform: translateX(2px);
      opacity:1;
    }

    .footer{
      position:relative;
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color: rgba(168,182,214,.9);
      font-size:12px;
    }

    .footer a{
      color: rgba(168,182,214,.95);
      text-decoration:none;
      border-bottom:1px dashed rgba(168,182,214,.35);
    }
    .footer a:hover{border-bottom-color: rgba(13,159,231,.65); color: #EAF1FF;}

    /* Reduced motion: respeta accesibilidad */
    @media (prefers-reduced-motion: reduce){
      *{ animation: none !important; transition: none !important; scroll-behavior:auto !important; }
      .card{ opacity:1; transform:none; }
      body::before{ display:none; }
    }

    /* Pequeño ajuste en pantallas muy pequeñas */
    @media (max-width: 360px){
      .label strong{ font-size:14px; }
      .name{ font-size: 26px; }
    }
  </style>
</head>
